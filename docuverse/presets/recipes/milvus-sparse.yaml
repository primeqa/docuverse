# Milvus learned-sparse retrieval. Defaults to IBM Granite's 30m sparse
# embedding (Apache-2.0); override `model_name` for SPLADE-family checkpoints.
db_engine: milvus-sparse
model_name: ibm-granite/granite-embedding-30m-sparse
index_name: docuverse_sparse
server: "file:./.docuverse/milvus.db"
top_k: 10
